<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>HPC Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; margin: 0; }
        .sidebar { width: 280px; background: #020617; padding: 25px; height: 100vh; border-right: 1px solid #334155; position: fixed; }
        .main { margin-left: 280px; flex: 1; padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: #1e293b; padding: 15px; border-radius: 10px; border: 1px solid #334155; text-align: center; }
        .progress-container { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .progress-bg { background: #020617; border-radius: 10px; height: 18px; width: 100%; overflow: hidden; margin-top: 10px; }
        .progress-fill { background: #22c55e; height: 100%; width: 0%; transition: 0.3s; }
        .charts-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-box { background: #1e293b; padding: 15px; border-radius: 12px; height: 240px; }
        .btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-start { background: #22c55e; } .btn-pause { background: #f59e0b; } .btn-priority { background: #ef4444; }
        .logs { background: #020617; padding: 15px; height: 140px; overflow-y: auto; font-family: monospace; color: #4ade80; border-radius: 10px; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: #38bdf8;">HPC ENGINE</h2>
        <button class="btn btn-start" onclick="fetch('/start')">▶ Start 1,000 Tasks</button>
        <button class="btn btn-pause" id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
        <button class="btn btn-priority" onclick="fetch('/addTask')">⚡ Inject Priority</button>
        
        <div style="margin-top:20px; border-top:1px solid #334155; padding-top:15px;">
            <label style="font-size: 0.8rem; color: #94a3b8;">SPEED THROTTLE</label>
            <input type="range" min="100" max="3000" value="1500" step="100" style="width:100%" oninput="updateSpeed(this.value)">
            <div id="speedVal" style="text-align:center; color:#38bdf8; font-weight: bold;">1500ms</div>
        </div>
    </div>

    <div class="main">
        <div class="progress-container">
            <div style="display:flex; justify-content:space-between;"><span>Execution Progress</span><span id="timer">---</span></div>
            <div class="progress-bg"><div class="progress-fill" id="pFill"></div></div>
        </div>
        <div class="grid">
            <div class="card"><p>Total</p><h3 id="t">0</h3></div>
            <div class="card"><p>Done</p><h3 id="c">0</h3></div>
            <div class="card"><p>Active</p><h3 id="a">0</h3></div>
            <div class="card"><p>Queue</p><h3 id="q">0</h3></div>
            <div class="card"><p>Avg Latency</p><h3 id="l">0ms</h3></div>
        </div>
        <div class="charts-wrapper">
            <div class="chart-box"><canvas id="tChart"></canvas></div>
            <div class="chart-box"><canvas id="qChart"></canvas></div>
        </div>
        <div class="logs" id="logBox"></div>
    </div>

<script>
    let isPaused = false;
    const ctxT = document.getElementById('tChart').getContext('2d');
    const ctxQ = document.getElementById('qChart').getContext('2d');
    const chartConf = (l, c) => ({ type: 'line', data: { labels: [], datasets: [{ label: l, data: [], borderColor: c, tension: 0.4, fill: true, backgroundColor: c+'11' }] }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { beginAtZero: true } } } });
    const tChart = new Chart(ctxT, chartConf('Workers', '#22c55e'));
    const qChart = new Chart(ctxQ, chartConf('Queue', '#38bdf8'));

    function togglePause() { fetch(isPaused ? '/resume' : '/pause'); }
    function updateSpeed(ms) { document.getElementById('speedVal').innerText = ms + "ms"; fetch('/setSpeed?ms=' + ms); }

    setInterval(async () => {
        try {
            const res = await fetch('/stats'); const data = await res.json();
            document.getElementById('t').innerText = data.total;
            document.getElementById('c').innerText = data.completed;
            document.getElementById('a').innerText = data.active;
            document.getElementById('q').innerText = data.queue;
            document.getElementById('l').innerText = data.latency + "ms";
            isPaused = data.paused;
            document.getElementById('pauseBtn').innerText = isPaused ? "▶ Resume" : "⏸ Pause";
            
            const time = new Date().toLocaleTimeString();
            [tChart, qChart].forEach((c, i) => {
                c.data.labels.push(time);
                c.data.datasets[0].data.push(i === 0 ? data.active : data.queue);
                if(c.data.labels.length > 20) { c.data.labels.shift(); c.data.datasets[0].data.shift(); }
                c.update('none');
            });

            if(data.total > 0) {
                document.getElementById('pFill').style.width = (data.completed/data.total*100) + "%";
                const ms = parseInt(document.getElementById('speedVal').innerText);
                document.getElementById('timer').innerText = "Remaining: ~" + Math.round((data.total-data.completed) * ms / 1000) + "s";
            }
            document.getElementById('logBox').innerHTML = data.logs.map(l => `<div>> ${l}</div>`).join('');
        } catch(e) {}
    }, 1000);
</script>
</body>
</html>
